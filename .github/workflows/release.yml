name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Build project
        run: npm run build

      - name: Get addon name from env
        id: addon-name
        run: |
          ADDON_NAME=$(grep '^ADDON_NAME=' build-settings.env | cut -d '=' -f2)
          echo "addon_name=${ADDON_NAME}" >> $GITHUB_OUTPUT
          echo "Building addon: ${ADDON_NAME}"

      - name: Determine release type
        id: release-type
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "release_name=Release ${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag_name=latest" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "release_name=Latest Build" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-type.outputs.tag_name }}
          name: ${{ steps.release-type.outputs.release_name }}
          body: |
            ${{ steps.release-type.outputs.is_tag == 'true' && format('Version {0}', steps.release-type.outputs.tag_name) || 'Latest build from main branch' }}

            Built from commit: ${{ github.sha }}
            Build date: ${{ github.event.head_commit.timestamp }}

            **Download:**
            [TalisAspireIntegration.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.release-type.outputs.tag_name }}/${{ steps.addon-name.outputs.addon_name }}.zip)
          files: dist/${{ steps.addon-name.outputs.addon_name }}.zip
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          make_latest: ${{ steps.release-type.outputs.is_tag == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
